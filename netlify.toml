[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/crm-preview.html"
  status = 200

[[redirects]]
  from = "/crm"
  to = "/crm-preview.html"
  status = 200
