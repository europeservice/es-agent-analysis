[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[functions]
  directory = "netlify/functions"

# ──────────────────────────────────────────
# Production: crm-preview (frozen)
# ──────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/crm-preview.html"
  status = 200

[[redirects]]
  from = "/crm"
  to = "/crm-preview.html"
  status = 200

# ──────────────────────────────────────────
# Beta context: deploys CRM v2 (React app)
# Triggered by branch "beta" or deploy context "beta"
# Domain: beta.europeserviceukraine.com.ua
# ──────────────────────────────────────────
[context.beta]
  base = "app"
  command = "npm ci && npm run build"
  publish = "dist"

  [context.beta.environment]
    NODE_VERSION = "20"

# Branch deploy for "beta" branch
[context.branch-deploy]
  base = "app"
  command = "npm ci && npm run build"
  publish = "dist"
